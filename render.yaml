services:
  - type: web
    name: mern-book-ecommerce
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BRAINTREE_MERCHANT_ID
        sync: false
      - key: BRAINTREE_PUBLIC_KEY
        sync: false
      - key: BRAINTREE_PRIVATE_KEY
        sync: false
